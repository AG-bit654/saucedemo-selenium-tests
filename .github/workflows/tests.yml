name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build

    - name: Fix permissions
      run: chmod +x /home/runner/work/saucedemo-selenium-tests/saucedemo-selenium-tests/bin/Debug/net10.0/selenium-manager/linux/selenium-manager

    - name: Run tests
      run: dotnet test